<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="카드왕국">
  <meta name="theme-color" content="#1a0533">
  <title>⭐ 카드 왕국</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0225;
      --bg2: #1a0533;
      --purple: #6c2eb9;
      --purple-light: #9b59e8;
      --yellow: #ffd700;
      --yellow-light: #ffe566;
      --pink: #ff6b9d;
      --mint: #4ecdc4;
      --orange: #ff8c42;
      --card-bg: rgba(255,255,255,0.07);
      --card-border: rgba(255,255,255,0.15);
      --text: #fff;
      --text-dim: rgba(255,255,255,0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Jua', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      overflow-x: hidden;
      position: relative;
    }

    /* 배경 별 효과 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(108,46,185,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255,107,157,0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(78,205,196,0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== 화면 전환 ===== */
    .screen {
      display: none;
      min-height: 100vh;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.3s ease;
    }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== 상단 헤더 ===== */
    .header {
      padding: 50px 20px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-title { font-size: 22px; }
    .coin-badge {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 18px;
      font-weight: bold;
      color: #1a0533;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
      animation: coinGlow 2s ease-in-out infinite alternate;
    }
    @keyframes coinGlow {
      from { box-shadow: 0 4px 20px rgba(255,215,0,0.3); }
      to { box-shadow: 0 4px 30px rgba(255,215,0,0.7); }
    }

    /* ===== 홈 화면 ===== */
    .welcome-section {
      padding: 10px 20px 20px;
      text-align: center;
    }
    .kingdom-icon {
      font-size: 80px;
      display: block;
      margin: 10px auto;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .welcome-title { font-size: 28px; margin: 5px 0; }
    .welcome-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; }

    /* 오늘의 뉴스 배너 */
    .news-banner {
      margin: 0 20px 20px;
      background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(108,46,185,0.2));
      border: 1px solid rgba(255,107,157,0.3);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .news-icon { font-size: 28px; flex-shrink: 0; animation: shake 2s ease-in-out infinite; }
    @keyframes shake {
      0%, 100% { transform: rotate(0); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }
    .news-text { font-size: 13px; line-height: 1.5; }
    .news-tag { font-size: 11px; color: var(--pink); font-weight: bold; }

    /* 빠른 메뉴 */
    .quick-menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 20px 20px;
    }
    .menu-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .menu-card:active { transform: scale(0.95); }
    .menu-card:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
    .menu-emoji { font-size: 40px; display: block; margin-bottom: 8px; }
    .menu-label { font-size: 15px; }
    .menu-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

    /* 내 카드 미리보기 */
    .section-title {
      padding: 0 20px 12px;
      font-size: 16px;
      color: var(--text-dim);
    }
    .my-cards-scroll {
      display: flex;
      gap: 12px;
      padding: 0 20px 30px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .my-cards-scroll::-webkit-scrollbar { display: none; }

    /* ===== 카드 컴포넌트 ===== */
    .card-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px;
      min-width: 100px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .card-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.05));
    }
    .card-item:active { transform: scale(0.95); }
    .card-emoji { font-size: 36px; display: block; margin-bottom: 6px; }
    .card-name { font-size: 13px; }
    .card-count { font-size: 11px; color: var(--yellow); margin-top: 3px; }
    .card-trend { font-size: 11px; margin-top: 2px; }
    .trend-up { color: #4ade80; }
    .trend-down { color: #f87171; }
    .trend-same { color: var(--text-dim); }

    /* 등급 뱃지 */
    .grade-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 50px;
    }
    .grade-common { background: rgba(156,163,175,0.3); color: #9ca3af; }
    .grade-rare { background: rgba(59,130,246,0.3); color: #60a5fa; }
    .grade-epic { background: rgba(168,85,247,0.3); color: #c084fc; }

    /* ===== 시장 화면 ===== */
    .market-list { padding: 0 20px 100px; }
    .market-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .market-item:active { transform: scale(0.98); }
    .market-emoji { font-size: 44px; flex-shrink: 0; }
    .market-info { flex: 1; }
    .market-name { font-size: 16px; }
    .market-price {
      font-size: 18px;
      color: var(--yellow);
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }
    .market-trend { font-size: 12px; }
    .market-grade { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
    .mini-chart {
      width: 60px;
      height: 30px;
      flex-shrink: 0;
    }
    .buy-btn {
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      color: white;
      font-family: 'Jua', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .buy-btn:active { transform: scale(0.95); }
    .cant-buy {
      background: rgba(255,255,255,0.1);
      color: var(--text-dim);
      cursor: not-allowed;
    }

    /* ===== 모달 ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-box {
      background: #1a0533;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.show .modal-box { transform: translateY(0); }
    .modal-handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-card-big { font-size: 80px; text-align: center; display: block; margin: 10px 0; }
    .modal-title { font-size: 24px; text-align: center; margin-bottom: 4px; }
    .modal-price { font-size: 20px; text-align: center; color: var(--yellow); margin-bottom: 6px; }
    .modal-desc { font-size: 13px; text-align: center; color: var(--text-dim); margin-bottom: 20px; line-height: 1.6; }

    .modal-actions { display: flex; gap: 10px; }
    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, var(--yellow), var(--orange));
      border: none;
      border-radius: 14px;
      padding: 16px;
      color: #1a0533;
      font-family: 'Jua', sans-serif;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 16px;
      color: white;
      font-family: 'Jua', sans-serif;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:active { transform: scale(0.97); }
    .btn-sell {
      background: linear-gradient(135deg, var(--pink), #ff4477);
      color: white;
    }

    /* 수량 조절 */
    .qty-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 16px 0;
    }
    .qty-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-size: 24px;
      cursor: pointer;
      font-family: 'Jua', sans-serif;
      transition: all 0.2s;
    }
    .qty-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
    .qty-display { font-size: 32px; min-width: 50px; text-align: center; }
    .total-cost { text-align: center; font-size: 14px; color: var(--text-dim); margin-bottom: 16px; }
    .total-cost span { color: var(--yellow); font-size: 18px; }

    /* ===== 내 컬렉션 화면 ===== */
    .collection-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      padding: 0 20px 100px;
    }
    .collection-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
      position: relative;
    }
    .collection-card:active { transform: scale(0.95); }
    .collection-card.empty { opacity: 0.3; cursor: default; }
    .collection-emoji { font-size: 36px; display: block; margin-bottom: 6px; }
    .collection-name { font-size: 12px; }
    .collection-count {
      background: var(--yellow);
      color: #1a0533;
      border-radius: 50px;
      font-size: 10px;
      padding: 2px 8px;
      margin-top: 5px;
      display: inline-block;
    }

    /* ===== 기록 화면 ===== */
    .history-list { padding: 0 20px 100px; }
    .history-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(10px);
    }
    .history-icon { font-size: 30px; flex-shrink: 0; }
    .history-info { flex: 1; }
    .history-desc { font-size: 14px; }
    .history-date { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .history-amount { font-size: 16px; font-weight: bold; }
    .amount-plus { color: #4ade80; }
    .amount-minus { color: #f87171; }

    /* 자산 요약 */
    .asset-summary {
      margin: 0 20px 20px;
      background: linear-gradient(135deg, rgba(108,46,185,0.3), rgba(255,107,157,0.2));
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
    }
    .asset-label { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
    .asset-total { font-size: 36px; color: var(--yellow); }
    .asset-change { font-size: 14px; margin-top: 6px; }

    /* ===== 하단 네비게이션 ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(26,5,51,0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      z-index: 50;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0 10px;
      cursor: pointer;
      transition: all 0.2s;
      gap: 4px;
    }
    .nav-icon { font-size: 24px; transition: transform 0.2s; }
    .nav-label { font-size: 10px; color: var(--text-dim); }
    .nav-item.active .nav-label { color: var(--yellow); }
    .nav-item.active .nav-icon { transform: scale(1.2); }

    /* ===== 토스트 메시지 ===== */
    .toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(30,15,60,0.95);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 14px;
      z-index: 200;
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
      backdrop-filter: blur(20px);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== 파티클 효과 ===== */
    .particle {
      position: fixed;
      pointer-events: none;
      font-size: 24px;
      z-index: 300;
      animation: particleFly 1s ease-out forwards;
    }
    @keyframes particleFly {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(0.5); }
    }

    /* ===== 빈 상태 ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .empty-icon { font-size: 60px; display: block; margin-bottom: 16px; opacity: 0.5; }
    .empty-text { font-size: 15px; }

    /* 스크롤바 숨김 */
    * { scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<!-- ===== 홈 화면 ===== -->
<div id="screen-home" class="screen active">
  <div class="header">
    <div class="header-title">🏰 카드 왕국</div>
    <div class="coin-badge">⭐ <span id="home-coins">500</span></div>
  </div>

  <div class="welcome-section">
    <span class="kingdom-icon">👑</span>
    <div class="welcome-title" id="greeting">안녕하세요!</div>
    <div class="welcome-sub" id="today-date"></div>
  </div>

  <div class="news-banner" id="news-banner">
    <div class="news-icon">📰</div>
    <div class="news-text">
      <div class="news-tag">오늘의 왕국 소식</div>
      <div id="news-text">로딩 중...</div>
    </div>
  </div>

  <div class="quick-menu">
    <div class="menu-card" onclick="goScreen('market')">
      <span class="menu-emoji">🏪</span>
      <div class="menu-label">카드 시장</div>
      <div class="menu-sub">사고 팔기</div>
    </div>
    <div class="menu-card" onclick="goScreen('collection')">
      <span class="menu-emoji">🃏</span>
      <div class="menu-label">내 컬렉션</div>
      <div class="menu-sub" id="home-card-count">카드 0장</div>
    </div>
    <div class="menu-card" onclick="goScreen('history')">
      <span class="menu-emoji">📊</span>
      <div class="menu-label">거래 기록</div>
      <div class="menu-sub">내 성적표</div>
    </div>
    <div class="menu-card" onclick="showToast('🚧 곧 업데이트 예정이에요!')">
      <span class="menu-emoji">🎁</span>
      <div class="menu-label">출석 보너스</div>
      <div class="menu-sub">매일 받기</div>
    </div>
  </div>

  <div class="section-title">내가 가진 카드 ✨</div>
  <div class="my-cards-scroll" id="home-my-cards">
    <div style="padding: 20px; color: var(--text-dim); font-size: 13px;">
      아직 카드가 없어요!<br>시장에서 사와요 🛒
    </div>
  </div>
</div>

<!-- ===== 시장 화면 ===== -->
<div id="screen-market" class="screen">
  <div class="header">
    <div class="header-title">🏪 카드 시장</div>
    <div class="coin-badge">⭐ <span id="market-coins">500</span></div>
  </div>

  <div class="market-list" id="market-list">
    <!-- JS로 생성 -->
  </div>
</div>

<!-- ===== 컬렉션 화면 ===== -->
<div id="screen-collection" class="screen">
  <div class="header">
    <div class="header-title">🃏 내 컬렉션</div>
    <div class="coin-badge">⭐ <span id="collection-coins">500</span></div>
  </div>

  <div class="collection-grid" id="collection-grid">
    <!-- JS로 생성 -->
  </div>
</div>

<!-- ===== 기록 화면 ===== -->
<div id="screen-history" class="screen">
  <div class="header">
    <div class="header-title">📊 거래 기록</div>
    <div class="coin-badge">⭐ <span id="history-coins">500</span></div>
  </div>

  <div class="asset-summary">
    <div class="asset-label">내 전체 자산</div>
    <div class="asset-total">⭐ <span id="total-asset">500</span></div>
    <div class="asset-change" id="asset-change">카드 왕국에 오신 걸 환영해요! 🎉</div>
  </div>

  <div class="history-list" id="history-list">
    <!-- JS로 생성 -->
  </div>
</div>

<!-- ===== 하단 네비게이션 ===== -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="goScreen('home')" id="nav-home">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">홈</div>
  </div>
  <div class="nav-item" onclick="goScreen('market')" id="nav-market">
    <div class="nav-icon">🏪</div>
    <div class="nav-label">시장</div>
  </div>
  <div class="nav-item" onclick="goScreen('collection')" id="nav-collection">
    <div class="nav-icon">🃏</div>
    <div class="nav-label">컬렉션</div>
  </div>
  <div class="nav-item" onclick="goScreen('history')" id="nav-history">
    <div class="nav-icon">📊</div>
    <div class="nav-label">기록</div>
  </div>
</nav>

<!-- ===== 카드 모달 ===== -->
<div class="modal-overlay" id="card-modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <span class="modal-card-big" id="modal-emoji">🐉</span>
    <div class="modal-title" id="modal-name">드래곤</div>
    <div class="modal-price">⭐ <span id="modal-price">300</span> 개</div>
    <div class="modal-desc" id="modal-desc">강력한 드래곤 카드!</div>

    <div class="qty-control" id="modal-qty-section">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <div class="qty-display" id="modal-qty">1</div>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <div class="total-cost" id="modal-total">총 <span id="modal-total-price">300</span> 별코인</div>

    <div class="modal-actions" id="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary" id="modal-confirm-btn" onclick="confirmBuy()">🛒 사기</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ===== 데이터 =====
const CARDS = [
  { id: 'cat',      emoji: '🐱', name: '고양이',   grade: 'common', basePrice: 50,  desc: '귀엽고 도도한 고양이예요. 매일 야옹~ 해줘요!' },
  { id: 'dog',      emoji: '🐶', name: '강아지',   grade: 'common', basePrice: 60,  desc: '친구들에게 인기 최고! 꼬리를 흔들어요 🐾' },
  { id: 'rabbit',   emoji: '🐰', name: '토끼',     grade: 'common', basePrice: 70,  desc: '폴짝폴짝! 당근을 좋아해요.' },
  { id: 'fox',      emoji: '🦊', name: '여우',     grade: 'rare',   basePrice: 120, desc: '영리한 여우예요. 왕국에서 보기 드물어요!' },
  { id: 'dino',     emoji: '🦖', name: '공룡',     grade: 'rare',   basePrice: 150, desc: '쿵쿵! 발소리가 왕국을 울려요.' },
  { id: 'robot',    emoji: '🤖', name: '로봇',     grade: 'rare',   basePrice: 180, desc: '삐리리릭! 뭐든지 척척 해내요.' },
  { id: 'dragon',   emoji: '🐉', name: '드래곤',   grade: 'epic',   basePrice: 300, desc: '왕국에서 가장 강력한 드래곤! 오늘만 만날 수 있어요.' },
  { id: 'unicorn',  emoji: '🦄', name: '유니콘',   grade: 'epic',   basePrice: 350, desc: '반짝반짝 빛나는 유니콘! 보는 것만으로도 행운이에요.' },
  { id: 'phoenix',  emoji: '🐦‍🔥', name: '불사조',  grade: 'epic',   basePrice: 400, desc: '불꽃 속에서 태어난 전설의 새! 초희귀예요.' },
];

const NEWS_EVENTS = [
  { text: '드래곤이 왕국 축제에 나타났어요! 🎉', affected: 'dragon', change: 0.3 },
  { text: '고양이가 인기 영상에 나왔어요! 📹', affected: 'cat', change: 0.2 },
  { text: '공룡이 왕국에서 낮잠 중이래요 😴', affected: 'dino', change: -0.15 },
  { text: '유니콘이 무지개를 만들었어요! 🌈', affected: 'unicorn', change: 0.25 },
  { text: '로봇이 왕국 시스템을 업그레이드했어요! ⚙️', affected: 'robot', change: 0.2 },
  { text: '강아지 달리기 대회가 열렸어요! 🏃', affected: 'dog', change: 0.15 },
  { text: '여우가 왕국 보물을 숨겼대요... 🔍', affected: 'fox', change: -0.1 },
  { text: '불사조가 왕국 하늘을 날았어요! 🔥', affected: 'phoenix', change: 0.35 },
  { text: '토끼 농장에 비가 많이 왔어요 🌧️', affected: 'rabbit', change: -0.1 },
  { text: '왕국 전체에 봄바람이 불어요 🌸', affected: null, change: 0.05 },
  { text: '왕국에 큰 폭풍이 왔어요! 모두 집에 있어요 🌪️', affected: null, change: -0.1 },
  { text: '왕국 왕이 카드 축제를 열었어요! 🎊', affected: null, change: 0.1 },
];

const GRADE_LABEL = { common: '흔한', rare: '희귀', epic: '전설' };

// ===== 날짜 씨앗 기반 랜덤 =====
function seededRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function getDateSeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function getTodayPrices() {
  const seed = getDateSeed();
  return CARDS.map((card, i) => {
    const r = seededRandom(seed + i * 137);
    const change = (r - 0.5) * 0.4; // -20% ~ +20%
    return Math.max(10, Math.round(card.basePrice * (1 + change)));
  });
}

function getTodayNews() {
  const seed = getDateSeed();
  const idx = Math.floor(seededRandom(seed * 7) * NEWS_EVENTS.length);
  return NEWS_EVENTS[idx];
}

// ===== 로컬 저장소 =====
function loadState() {
  const saved = localStorage.getItem('cardKingdom');
  if (saved) return JSON.parse(saved);
  return {
    coins: 500,
    cards: {},      // { cardId: count }
    history: [],
    joinDate: new Date().toLocaleDateString('ko-KR'),
  };
}

function saveState() {
  localStorage.setItem('cardKingdom', JSON.stringify(state));
}

let state = loadState();
let todayPrices = getTodayPrices();
let todayNews = getTodayNews();

// 뉴스 이벤트 반영
function getPriceWithNews(cardIndex) {
  let price = todayPrices[cardIndex];
  const card = CARDS[cardIndex];
  if (todayNews.affected === null) {
    price = Math.round(price * (1 + todayNews.change));
  } else if (todayNews.affected === card.id) {
    price = Math.round(price * (1 + todayNews.change));
  }
  return Math.max(10, price);
}

// ===== 화면 전환 =====
function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  renderScreen(name);
}

function renderScreen(name) {
  updateCoins();
  if (name === 'home') renderHome();
  if (name === 'market') renderMarket();
  if (name === 'collection') renderCollection();
  if (name === 'history') renderHistory();
}

function updateCoins() {
  ['home', 'market', 'collection', 'history'].forEach(s => {
    const el = document.getElementById(s + '-coins');
    if (el) el.textContent = state.coins.toLocaleString();
  });
}

// ===== 홈 렌더 =====
function renderHome() {
  const now = new Date();
  const hours = now.getHours();
  const greeting = hours < 12 ? '좋은 아침이에요! ☀️' : hours < 18 ? '안녕하세요! 👋' : '좋은 저녁이에요! 🌙';
  document.getElementById('greeting').textContent = greeting;
  document.getElementById('today-date').textContent =
    now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

  document.getElementById('news-text').textContent = todayNews.text;

  // 내 카드 미리보기
  const myCardsEl = document.getElementById('home-my-cards');
  const myCardIds = Object.keys(state.cards).filter(id => state.cards[id] > 0);
  let totalCards = myCardIds.reduce((sum, id) => sum + state.cards[id], 0);
  document.getElementById('home-card-count').textContent = `카드 ${totalCards}장`;

  if (myCardIds.length === 0) {
    myCardsEl.innerHTML = '<div style="padding: 20px; color: var(--text-dim); font-size: 13px;">아직 카드가 없어요!<br>시장에서 사와요 🛒</div>';
    return;
  }

  myCardsEl.innerHTML = myCardIds.map(id => {
    const cardIdx = CARDS.findIndex(c => c.id === id);
    const card = CARDS[cardIdx];
    const price = getPriceWithNews(cardIdx);
    const base = CARDS[cardIdx].basePrice;
    const diff = price - base;
    const trendClass = diff > 0 ? 'trend-up' : diff < 0 ? 'trend-down' : 'trend-same';
    const trendText = diff > 0 ? `▲ ${diff}` : diff < 0 ? `▼ ${Math.abs(diff)}` : '─';
    return `<div class="card-item" onclick="openSellModal(${cardIdx})">
      <span class="grade-badge grade-${card.grade}">${GRADE_LABEL[card.grade]}</span>
      <span class="card-emoji">${card.emoji}</span>
      <div class="card-name">${card.name}</div>
      <div class="card-count">${state.cards[id]}장</div>
      <div class="card-trend ${trendClass}">${trendText}</div>
    </div>`;
  }).join('');
}

// ===== 시장 렌더 =====
function renderMarket() {
  const listEl = document.getElementById('market-list');
  listEl.innerHTML = CARDS.map((card, i) => {
    const price = getPriceWithNews(i);
    const base = card.basePrice;
    const diff = price - base;
    const pct = Math.round(diff / base * 100);
    const trendClass = diff > 0 ? 'trend-up' : diff < 0 ? 'trend-down' : 'trend-same';
    const trendText = diff > 0 ? `▲ ${pct}%` : diff < 0 ? `▼ ${Math.abs(pct)}%` : '─';
    const canBuy = state.coins >= price;
    const owned = state.cards[card.id] || 0;

    // 미니 차트 (SVG)
    const chartPts = Array.from({length: 5}, (_, j) => {
      const s = getDateSeed() - j * 100;
      const r = seededRandom(s + i * 137);
      return Math.round(base * (0.8 + r * 0.4));
    }).reverse();
    chartPts.push(price);
    const minP = Math.min(...chartPts), maxP = Math.max(...chartPts);
    const range = maxP - minP || 1;
    const pts = chartPts.map((p, j) =>
      `${j * 12},${28 - Math.round((p - minP) / range * 24)}`).join(' ');
    const lineColor = diff >= 0 ? '#4ade80' : '#f87171';

    return `<div class="market-item" onclick="openBuyModal(${i})">
      <div class="market-emoji">${card.emoji}</div>
      <div class="market-info">
        <div class="market-name">${card.name} ${owned > 0 ? `<small style="color:var(--yellow)">보유 ${owned}장</small>` : ''}</div>
        <div class="market-price">⭐ ${price.toLocaleString()} <span class="market-trend ${trendClass}">${trendText}</span></div>
        <div class="market-grade">${GRADE_LABEL[card.grade]} 카드</div>
      </div>
      <svg class="mini-chart" viewBox="0 0 60 30" preserveAspectRatio="none">
        <polyline points="${pts}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <button class="buy-btn ${canBuy ? '' : 'cant-buy'}" onclick="event.stopPropagation(); openBuyModal(${i})">
        ${canBuy ? '사기' : '부족'}
      </button>
    </div>`;
  }).join('');
}

// ===== 컬렉션 렌더 =====
function renderCollection() {
  const gridEl = document.getElementById('collection-grid');
  gridEl.innerHTML = CARDS.map((card, i) => {
    const count = state.cards[card.id] || 0;
    const isEmpty = count === 0;
    return `<div class="collection-card ${isEmpty ? 'empty' : ''}" onclick="${isEmpty ? '' : `openSellModal(${i})`}">
      <span class="grade-badge grade-${card.grade}">${GRADE_LABEL[card.grade]}</span>
      <span class="collection-emoji">${card.emoji}</span>
      <div class="collection-name">${card.name}</div>
      ${count > 0 ? `<div class="collection-count">${count}장</div>` : '<div style="font-size:10px;color:var(--text-dim);margin-top:5px;">미보유</div>'}
    </div>`;
  }).join('');
}

// ===== 기록 렌더 =====
function renderHistory() {
  const totalCards = Object.values(state.cards).reduce((a, b) => a + b, 0);
  const cardValue = CARDS.reduce((sum, card, i) => {
    const count = state.cards[card.id] || 0;
    return sum + count * getPriceWithNews(i);
  }, 0);
  const totalAsset = state.coins + cardValue;
  document.getElementById('total-asset').textContent = totalAsset.toLocaleString();

  const histEl = document.getElementById('history-list');
  if (state.history.length === 0) {
    histEl.innerHTML = '<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-text">아직 거래 기록이 없어요<br>시장에서 카드를 사보세요!</div></div>';
    return;
  }
  histEl.innerHTML = state.history.slice().reverse().map(h => `
    <div class="history-item">
      <div class="history-icon">${h.type === 'buy' ? '🛒' : '💸'}</div>
      <div class="history-info">
        <div class="history-desc">${h.emoji} ${h.name} ${h.count}장 ${h.type === 'buy' ? '구매' : '판매'}</div>
        <div class="history-date">${h.date}</div>
      </div>
      <div class="history-amount ${h.type === 'buy' ? 'amount-minus' : 'amount-plus'}">
        ${h.type === 'buy' ? '-' : '+'}⭐${(h.total).toLocaleString()}
      </div>
    </div>
  `).join('');
}

// ===== 모달 =====
let currentCardIdx = null;
let currentQty = 1;
let currentMode = 'buy'; // 'buy' | 'sell'

function openBuyModal(cardIdx) {
  currentCardIdx = cardIdx;
  currentQty = 1;
  currentMode = 'buy';
  const card = CARDS[cardIdx];
  const price = getPriceWithNews(cardIdx);

  document.getElementById('modal-emoji').textContent = card.emoji;
  document.getElementById('modal-name').textContent = card.name;
  document.getElementById('modal-price').textContent = price.toLocaleString();
  document.getElementById('modal-desc').textContent = card.desc;
  document.getElementById('modal-qty-section').style.display = 'flex';
  document.getElementById('modal-total').style.display = 'block';
  document.getElementById('modal-qty').textContent = '1';
  document.getElementById('modal-total-price').textContent = price.toLocaleString();

  const btn = document.getElementById('modal-confirm-btn');
  btn.textContent = '🛒 사기';
  btn.className = 'btn-primary';
  btn.onclick = confirmBuy;

  if (state.coins < price) {
    btn.textContent = '⭐ 별코인이 부족해요';
    btn.style.opacity = '0.5';
  } else {
    btn.style.opacity = '1';
  }

  document.getElementById('card-modal').classList.add('show');
}

function openSellModal(cardIdx) {
  const count = state.cards[CARDS[cardIdx].id] || 0;
  if (count === 0) return;
  currentCardIdx = cardIdx;
  currentQty = 1;
  currentMode = 'sell';
  const card = CARDS[cardIdx];
  const price = getPriceWithNews(cardIdx);

  document.getElementById('modal-emoji').textContent = card.emoji;
  document.getElementById('modal-name').textContent = `${card.name} (보유 ${count}장)`;
  document.getElementById('modal-price').textContent = price.toLocaleString();
  document.getElementById('modal-desc').textContent = `팔면 ⭐${price.toLocaleString()} 받아요!`;
  document.getElementById('modal-qty-section').style.display = 'flex';
  document.getElementById('modal-total').style.display = 'block';
  document.getElementById('modal-qty').textContent = '1';
  document.getElementById('modal-total-price').textContent = price.toLocaleString();

  const btn = document.getElementById('modal-confirm-btn');
  btn.textContent = '💸 팔기';
  btn.className = 'btn-primary btn-sell';
  btn.onclick = confirmSell;
  btn.style.opacity = '1';

  document.getElementById('card-modal').classList.add('show');
}

function changeQty(delta) {
  const card = CARDS[currentCardIdx];
  const price = getPriceWithNews(currentCardIdx);
  const maxBuy = Math.floor(state.coins / price);
  const maxSell = state.cards[card.id] || 0;
  const maxQty = currentMode === 'buy' ? maxBuy : maxSell;

  currentQty = Math.max(1, Math.min(maxQty, currentQty + delta));
  document.getElementById('modal-qty').textContent = currentQty;
  document.getElementById('modal-total-price').textContent = (price * currentQty).toLocaleString();
}

function confirmBuy() {
  const card = CARDS[currentCardIdx];
  const price = getPriceWithNews(currentCardIdx);
  const total = price * currentQty;

  if (state.coins < total) { showToast('⭐ 별코인이 부족해요!'); return; }

  state.coins -= total;
  state.cards[card.id] = (state.cards[card.id] || 0) + currentQty;
  state.history.push({
    type: 'buy', id: card.id, emoji: card.emoji, name: card.name,
    count: currentQty, price, total,
    date: new Date().toLocaleString('ko-KR')
  });
  saveState();
  closeModal();
  spawnParticles(card.emoji);
  showToast(`🎉 ${card.name} ${currentQty}장을 샀어요!`);
  renderScreen('market');
}

function confirmSell() {
  const card = CARDS[currentCardIdx];
  const price = getPriceWithNews(currentCardIdx);
  const total = price * currentQty;
  const owned = state.cards[card.id] || 0;
  if (owned < currentQty) { showToast('카드가 부족해요!'); return; }

  state.coins += total;
  state.cards[card.id] -= currentQty;
  state.history.push({
    type: 'sell', id: card.id, emoji: card.emoji, name: card.name,
    count: currentQty, price, total,
    date: new Date().toLocaleString('ko-KR')
  });
  saveState();
  closeModal();
  spawnParticles('⭐');
  showToast(`💰 ⭐${total.toLocaleString()} 받았어요!`);
  renderScreen('collection');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('card-modal')) return;
  document.getElementById('card-modal').classList.remove('show');
}

// ===== 토스트 =====
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== 파티클 =====
function spawnParticles(emoji) {
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emoji;
    p.style.left = (30 + Math.random() * 40) + 'vw';
    p.style.top = (40 + Math.random() * 20) + 'vh';
    p.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

// ===== 초기화 =====
renderHome();
</script>
</body>
</html>
